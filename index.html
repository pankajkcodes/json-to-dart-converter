<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON To Dart Model Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:6px;
}

textarea{
    width:100%;
    height:300px;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
    resize:vertical;
}

button{
    margin-top:10px;
    padding:12px 20px;
    border:none;
    background:#2196f3;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}

.output{
    margin-top:20px;
}

pre{
    background:#1e1e1e;
    color:#fff;
    padding:20px;
    border-radius:6px;
    overflow:auto;
}
</style>
</head>
<body>

<div class="container">

<h1>JSON To Dart Model Generator</h1>

<input
id="className"
placeholder="Class Name (Example: Artist)"
value="Artist"
/>

<textarea id="jsonInput">
{
  "_id":"123",
  "name":"John",
  "role":"Singer",
  "type":"Artist",
  "profileImages":"image.jpg",
  "createdAt":"2025-01-01T00:00:00.000Z",
  "updatedAt":"2025-01-01T00:00:00.000Z",
  "__v":0
}
</textarea>

<button onclick="generateModel()">
Generate Dart Model
</button>

<div class="output">
<pre id="result"></pre>
</div>

</div>

<script>

function getDartType(value,key){

    if(key.toLowerCase().includes('date') ||
       key.toLowerCase().includes('createdat') ||
       key.toLowerCase().includes('updatedat')){
        return 'DateTime';
    }

    if(typeof value === 'string')
        return 'String';

    if(typeof value === 'number'){
        return Number.isInteger(value)
            ? 'int'
            : 'double';
    }

    if(typeof value === 'boolean')
        return 'bool';

    if(Array.isArray(value))
        return 'List<dynamic>';

    if(typeof value === 'object')
        return 'Map<String, dynamic>';

    return 'dynamic';
}

function defaultValue(type){

    switch(type){
        case 'String':
            return "''";

        case 'int':
            return '0';

        case 'double':
            return '0.0';

        case 'bool':
            return 'false';

        case 'List<dynamic>':
            return '[]';

        case 'Map<String, dynamic>':
            return '{}';

        default:
            return 'null';
    }
}

function generateModel(){

    try{

        const json = JSON.parse(
            document.getElementById('jsonInput').value
        );

        const className =
            document.getElementById('className').value.trim() || 'Model';

        let fields = '';
        let constructor = '';
        let fromJson = '';
        let toJson = '';

        Object.keys(json).forEach(key => {

            const type = getDartType(json[key],key);

            const fieldName = key === '_id'
                ? 'id'
                : key.replace(/[^a-zA-Z0-9]/g,'');

            fields += `  final ${type} ${fieldName};\n`;

            constructor += `    required this.${fieldName},\n`;

            if(type === 'DateTime'){

                fromJson +=
`      ${fieldName}: DateTime.tryParse(json['${key}'] ?? '') ?? DateTime.now(),
`;

                toJson +=
`      '${key}': ${fieldName}.toIso8601String(),
`;

            }else{

                fromJson +=
`      ${fieldName}: json['${key}'] ?? ${defaultValue(type)},
`;

                toJson +=
`      '${key}': ${fieldName},
`;

            }

        });

        const dartCode =

`class ${className} {

${fields}

  ${className}({
${constructor}
  });

  factory ${className}.fromJson(
      Map<String, dynamic> json) {

    return ${className}(

${fromJson}
    );
  }

  Map<String, dynamic> toJson() {

    return {

${toJson}
    };
  }
}
`;

        document.getElementById('result').textContent = dartCode;

    }catch(e){

        document.getElementById('result').textContent =
            'Invalid JSON';
    }
}
</script>

</body>
</html>
