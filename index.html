<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON To Dart Model Generator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
      }
      .container {
        max-width: 1200px;
        margin: auto;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      textarea {
        height: 300px;
      }
      button {
        padding: 12px 16px;
        margin-right: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      pre {
        background: #1e1e1e;
        color: #fff;
        padding: 20px;
        border-radius: 8px;
        overflow: auto;
        min-height: 300px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>JSON To Dart Model Generator</h1>

      <input id="className" placeholder="Class Name" />

      <select id="exampleSelect" onchange="loadExample()">
        <option value="">Select Example</option>
        <option value="artist">Artist</option>
        <option value="category">Category</option>
        <option value="product">Product</option>
        <option value="user">User</option>
      </select>

      <textarea
        id="jsonInput"
        placeholder="Paste your JSON here and click Generate Model"
      ></textarea>

      <button onclick="generateModel()">Generate</button>
      <button onclick="copyCode()">Copy</button>
      <button onclick="downloadDart()">Download Dart</button>

      <pre id="result"></pre>
    </div>

    <script>
      function loadExample() {
        const examples = {
          artist: {
            _id: "1",
            name: "Arijit Singh",
            role: "Singer",
            type: "Artist",
            profileImages: "artist.jpg",
            createdAt: "2025-01-01T00:00:00.000Z",
            updatedAt: "2025-01-01T00:00:00.000Z",
            __v: 0,
          },
          category: {
            _id: "1",
            catName: "Electronics",
            position: 1,
            image: "image.png",
            status: true,
            createdAt: "2025-01-01T00:00:00.000Z",
            updatedAt: "2025-01-01T00:00:00.000Z",
            __v: 0,
          },
          product: {
            _id: "1",
            name: "iPhone 16",
            price: 79999,
            discount: 10.5,
            stock: 100,
            isAvailable: true,
            createdAt: "2025-01-01T00:00:00.000Z",
            __v: 0,
          },
          user: {
            _id: "1",
            name: "Pankaj",
            email: "test@gmail.com",
            mobile: "9876543210",
            isVerified: true,
            createdAt: "2025-01-01T00:00:00.000Z",
            __v: 0,
          },
        };
        const value = document.getElementById("exampleSelect").value;
        if (value) {
          jsonInput.value = JSON.stringify(examples[value], null, 2);
          className.value = value.charAt(0).toUpperCase() + value.slice(1);
          generateModel();
        }
      }

      function getFieldName(k) {
        if (k == "_id") return "id";
        if (k == "__v") return "v";
        return k;
      }
      function getType(v, k) {
        let l = k.toLowerCase();
        if (
          l.includes("createdat") ||
          l.includes("updatedat") ||
          l.includes("date")
        )
          return "DateTime";
        if (typeof v === "string") return "String";
        if (typeof v === "boolean") return "bool";
        if (typeof v === "number")
          return Number.isInteger(v) ? "int" : "double";
        if (Array.isArray(v)) return "List<dynamic>";
        return "dynamic";
      }
      function def(t) {
        if (t == "String") return "''";
        if (t == "int") return "0";
        if (t == "double") return "0.0";
        if (t == "bool") return "false";
        if (t == "List<dynamic>") return "[]";
        return "null";
      }
      function generateModel() {
        try {
          const json = JSON.parse(jsonInput.value);
          const c = className.value || "Model";
          let f = "",
            con = "",
            fr = "",
            tj = "";
          Object.keys(json).forEach((k) => {
            let t = getType(json[k], k),
              n = getFieldName(k);
            f += `  final ${t} ${n};\n`;
            con += `    required this.${n},\n`;
            if (t === "DateTime") {
              fr += `      ${n}: DateTime.tryParse(json['${k}'] ?? '') ?? DateTime.now(),\n`;
              tj += `      '${k}': ${n}.toIso8601String(),\n`;
            } else {
              fr += `      ${n}: json['${k}'] ?? ${def(t)},\n`;
              tj += `      '${k}': ${n},\n`;
            }
          });
          result.textContent = `class ${c} {\n\n${f}\n  ${c}({\n${con}  });\n\n  factory ${c}.fromJson(Map<String,dynamic> json){\n    return ${c}(\n${fr}    );\n  }\n\n  Map<String,dynamic> toJson(){\n    return {\n${tj}    };\n  }\n\n  @override\n  String toString(){\n    return toJson().toString();\n  }\n}`;
        } catch (e) {
          result.textContent = "Invalid JSON";
        }
      }
      function copyCode() {
        navigator.clipboard.writeText(result.textContent);
        alert("Copied");
      }
      function downloadDart() {
        const blob = new Blob([result.textContent], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = (className.value || "model").toLowerCase() + ".dart";
        a.click();
      }
    </script>
  </body>
</html>
